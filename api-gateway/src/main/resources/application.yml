server:
  port: 8080

spring:
  application:
    name: apigateway

  cloud:
    gateway:
      routes:
        - id: registryservice
          uri: lb://registryservice
          predicates:
            - Path=/registry/**

        - id: metricservice
          uri: lb://metricservice
          predicates:
            - Path=/metrics/**

        - id: scalingservice
          uri: lb://scalingservice
          predicates:
            - Path=/scaling/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework.cloud.gateway: INFO

